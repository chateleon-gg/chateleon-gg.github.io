<head>
    <title>Chateleon</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">


<style>
    input, button {
        width: 220px;
        height: 30px;
        font-size: 18px;
    }

    input {
        border: 1px solid rgb(52, 66, 54);
        background-color:rgb(33, 44, 35);
                color: rgb(255,255,255);
    }

    button {
        background-color: #34db7a;
        color: rgb(0, 0, 0);
        cursor: pointer;
        border: none;
        transition: transform 0.3s ease, background-color 0.3s ease;
    }

    button:hover {
  /* Scale the button to 1.1 times its original size on hover */
  transform: scale(1.01);
  background-color: #7bf1ac; /* Change background color */
}

    button:active {
  /* Scale down slightly when clicked */
  background-color: #388558; /* Change background color */
  transform: scale(0.99);
}

    label {
        font-size: 20px;
        color: rgb(255,255,255);
    }

    body {
        background-color:rgb(20, 27, 21)
    }

    body, label, input, button {
        font-family: "Fredoka", sans-serif;
        border-radius: 12px;
    }

    .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        gap: 10px;
    }
   
</style>


</head>


<div class="container">
    <label for="username">Username:</label>
    <input type="text" id="username" name="username">
    <label for="password">Password:</label>
    <input type="text" id="password" name="password">
    <button id="login button">Sign Up</button>
</div>


<script>
    const usname = document.getElementById("username")
    const psword = document.getElementById("password")
    const login = document.getElementById("login button")


    async function usnameChanged() {
        usname.value = usname.value.replace(/[^a-zA-Z0-9]/g, "");
        usname.value = usname.value.substring(0,19)
    }
    async function pswordChanged() {
        psword.value = psword.value.substring(0,49)
    }
    usname.addEventListener('input', usnameChanged)
    psword.addEventListener('input', pswordChanged)
    login.addEventListener('input', pswordChanged)
</script>
