<head>
    <title>Chateleon</title>
    <link rel="icon" href="../images/ChateleonLogo.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>


<div class="container">
    <label for="username">Username:</label>
    <input type="text" id="username" name="username">
    
    <label for="password">Password:</label>
    <input type="text" id="password" name="password">
    
    <label id="errmsg" style="font-size: 12px; color: rgb(255,125,125)"></label>
    
    <button id="login button">Sign Up</button>
</div>


<script>
    const usname = document.getElementById("username")
    const psword = document.getElementById("password")
    const button = document.getElementById("login button")
    const errmsg = document.getElementById("errmsg")

    async function usnameChanged() {
        errmsg.textContent = ''
        usname.value = usname.value.replace(/[^a-zA-Z0-9]/g, "");
        usname.value = usname.value.substring(0,19)
    }
    async function pswordChanged() {
        errmsg.textContent = ''

        psword.value = psword.value.substring(0,49)
    }
    usname.addEventListener('input', usnameChanged)
    psword.addEventListener('input', pswordChanged)
    
    button.addEventListener('click', function() {
        const username = usname.value
        const password = psword.value

        if (!/\d/.test(password)) {
            errmsg.textContent = 'Password must contain at least one digit'
        } else if (password.length < 8) {
            errmsg.textContent = 'Password must be at least 8 characters long.\nHaving your password more than 20 characters long is recommended.'
        } else if (username == '') {
            errmsg.textContent = 'Invalid Username'
        } else if (password == '') {
            errmsg.textContent = 'Invalid Password'
        } else {
            errmsg.textContent = ''
            console.log(username + ':' + password)
        }
    })
</script>
