<head>
    <title>Chateleon</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">


<style>
    input, button {
        width: 220px;
        height: 30px;
        font-size: 18px;
    }

    button {
        padding: 10px 20px;
          background-color: #3498db;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  /* Smoothly animate changes to 'transform' and 'background-color' over 0.3s */
  transition: transform 0.3s ease, background-color 0.3s ease;
    }

    label {
        font-size: 20px;
    }


    body, label, input, button {
        font-family: "Fredoka", sans-serif;
        border-radius: 12px;
    }


    .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        gap: 10px;
    }
   
</style>


</head>


<div class="container">
    <label for="username">Username:</label>
    <input type="text" id="username" name="username">
    <label for="password">Password:</label>
    <input type="text" id="password" name="password">
    <button id="login button">Sign Up</button>
</div>


<script>
    const usname = document.getElementById("username")
    const psword = document.getElementById("password")
    const login = document.getElementById("login button")


    async function usnameChanged() {
        usname.value = usname.value.replace(/[^a-zA-Z0-9]/g, "");
        usname.value = usname.value.substring(0,19)
    }
    async function pswordChanged() {
        psword.value = psword.value.substring(0,49)
    }
    usname.addEventListener('input', usnameChanged)
    psword.addEventListener('input', pswordChanged)
    login.addEventListener('input', pswordChanged)
</script>
